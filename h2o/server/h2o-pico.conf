error-log: /dev/stderr


hosts:
  "ec2-13-222-23-193.compute-1.amazonaws.com":
    #for tcp on http/2 listen on 8443. on docker this will be remapped
    listen:
      port: 8443
      ssl:
         certificate-file: /etc/h2o/server.crt
         key-file: /etc/h2o/server.key
    #http3 on 8444
    listen:
       quic:
          ecn: OFF
          sndbuf: 1500000
          rcvbuf: 1500000
       port: 8444
       cc: Pico
       ssl:
          certificate-file: /etc/h2o/server.crt
          key-file: /etc/h2o/server.key
    #where the payloads are 
    paths:
      /:
        file.dir: /srv/static
        header.set: "Alt-Svc: h3=\":8450\"; ma=86400"
