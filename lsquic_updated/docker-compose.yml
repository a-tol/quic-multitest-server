version: "3.9"

# ── shared network ─────────────────────────────────────────────────────────────
networks:
  quic-net:
    driver: bridge

# ── shared build args ─────────────────────────────────────────────────────────
x-lsquic-build: &lsquic-build
  context: .
  dockerfile: docker/Dockerfile

services:

  # ── lsquic HTTP/3 server (UDP 4433) ─────────────────────────────────────────
  server:
    build:
      <<: *lsquic-build
      target: server-image
    image: lsquic-server
    volumes:
      - ./payloads:/payloads:ro
    networks:
      - quic-net
    ports:
      - "4433:4433/udp"
    healthcheck:
      test: ["CMD", "sh", "-c", "ls /certs/server.crt 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── one-shot client validation ───────────────────────────────────────────────
  client:
    build:
      <<: *lsquic-build
      target: client-image
    image: lsquic-client
    volumes:
      - ./payloads:/payloads:ro
      - ./results:/results
    networks:
      - quic-net
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=4433
    depends_on:
      - server
    profiles:
      - client

  # ── QUIC / HTTP-3 load tester ────────────────────────────────────────────────
  load-tester:
    build:
      <<: *lsquic-build
      target: load-tester-image
    image: lsquic-load-tester
    volumes:
      - ./results:/results
    networks:
      - quic-net
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=4433
      - REPETITIONS=${REPETITIONS:-40}
      - RESULTS_DIR=/results
    depends_on:
      - server

  # ── nginx TCP server (HTTP/1.1 + HTTP/2 over TLS on port 8080) ───────────────
  tcp-server:
    build:
      context: docker/tcp-server
    image: lsquic-tcp-server
    volumes:
      - ./payloads:/payloads:ro
    networks:
      - quic-net
    ports:
      - "9443:8080/tcp"

  # ── TCP / HTTP-1.1 + HTTP-2 load tester ─────────────────────────────────────
  load-tester-tcp:
    build:
      context: docker/tcp-load-tester
    image: lsquic-tcp-load-tester
    volumes:
      - ./results:/results
    networks:
      - quic-net
    environment:
      - SERVER_HOST=tcp-server
      - SERVER_PORT=8080
      - REPETITIONS=${REPETITIONS:-40}
      - RESULTS_DIR=/results
    depends_on:
      - tcp-server
