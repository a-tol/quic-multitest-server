services:
  # ── quicsample server (custom ALPN "sample") ────────────────────────────────
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: server
    container_name: quicsample-server
    volumes:
      - ./results:/results
    networks:
      - quic-net

  # ── quicsample client ────────────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: client
    container_name: quicsample-client
    environment:
      - TARGET=server
      - MAX_RETRIES=15
      - RETRY_DELAY=2
    volumes:
      - ./results:/results
    networks:
      - quic-net
    depends_on:
      - server

  # ── load tester: HTTP/2 + HTTP/3 (QUIC) ────────────────────────────────────
  load-tester:
    build:
      context: ./docker/load-tester
      dockerfile: Dockerfile
    container_name: quic-load-tester
    environment:
      - SERVER_URL=https://h3-server:4433
      - REPETITIONS=40
      - RESULTS_DIR=/results
      - CACERT=/certs/server.crt
      - TEST_MODE=quic
    volumes:
      - ./results:/results
      - h3_certs:/certs:ro
    networks:
      - quic-net
    depends_on:
      - h3-server

  # ── load tester: HTTP/1.1 + HTTP/2 (TCP) ────────────────────────────────────
  load-tester-tcp:
    build:
      context: ./docker/load-tester
      dockerfile: Dockerfile
    container_name: tcp-load-tester
    environment:
      - SERVER_URL=https://h3-server:4433
      - REPETITIONS=100
      - RESULTS_DIR=/results
      - CACERT=/certs/server.crt
      - TEST_MODE=tcp
    volumes:
      - ./results:/results
      - h3_certs:/certs:ro
    networks:
      - quic-net
    depends_on:
      - h3-server

  # ── HTTP/3 file server (Caddy + QUIC) for Chrome payload tests ──────────────
  h3-server:
    build:
      context: ./docker/h3-server
      dockerfile: Dockerfile
    container_name: quic-h3-server
    ports:
      - "4433:4433/tcp"    # HTTP/1.1 + HTTP/2 (TLS) — Chrome's first request
      - "4433:4433/udp"    # HTTP/3 / QUIC — Chrome upgrades here via Alt-Svc
    volumes:
      - ./payloads:/payloads:ro
      - h3_certs:/certs    # cert persisted across restarts
    networks:
      - quic-net

volumes:
  h3_certs:

networks:
  quic-net:
    driver: bridge
