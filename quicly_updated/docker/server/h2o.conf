error-log: /dev/stderr

# HTTP — TCP 8080
listen:
  host: 0.0.0.0
  port: 8080

# HTTPS — TCP 8443 (HTTP/1.1 + HTTP/2 via ALPN)
listen:
  host: 0.0.0.0
  port: 8443
  ssl:
    certificate-file: /etc/h2o/server.crt
    key-file: /etc/h2o/server.key
    minimum-version: TLSv1.2

# HTTP/3 — UDP 8444 (QUIC)
# Separate port matches h2o's own test harness (Util.pm).
# Sharing port 8443 between TCP and UDP causes silent bind failures in h2o.
listen:
  host: 0.0.0.0
  port: 8444
  type: quic
  ssl:
    certificate-file: /etc/h2o/server.crt
    key-file: /etc/h2o/server.key

hosts:
  default:
    paths:
      /:
        file.dir: /srv/static
        # Advertise HTTP/3 availability on port 8444
        header.set: "Alt-Svc: h3=\":8444\"; ma=86400"
    access-log: /dev/stdout
