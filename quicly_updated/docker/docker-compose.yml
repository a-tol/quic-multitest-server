services:

  # ── h2o server ─────────────────────────────────────────────────────────────
  # Built from local source. Serves payloads pre-generated by
  # scripts/generate-payloads.sh (or auto-generates missing ones at startup).
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: h2o-server
    ports:
      - "8080:8080"        # HTTP  (TCP — HTTP/1.1)
      - "8443:8443"        # HTTPS (TCP — HTTP/1.1 + HTTP/2)
      - "8444:8444/udp"    # QUIC  (UDP — HTTP/3)
    volumes:
      - ./payloads:/srv/static   # pre-generated payload files
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/1mb.bin", "-o", "/dev/null"]
      interval: 5s
      timeout: 10s
      retries: 24
      start_period: 10s

  # ── load-tester: HTTP/3 (QUIC) only ────────────────────────────────────────
  # curl built from source with ngtcp2+nghttp3+quictls.
  # Run with: docker compose run --rm load-tester
  # Output  : results/load_results_<ts>.json  +  load_summary_<ts>.txt
  load-tester:
    build:
      context: ./load-tester
    container_name: h2o-load-tester
    depends_on:
      server:
        condition: service_healthy
    environment:
      - REPETITIONS=${REPETITIONS:-40}
      - RESULTS_DIR=/results
    volumes:
      - ./results:/results
    restart: "no"

  # ── load-tester-tcp: HTTP/1.1 + HTTP/2 ─────────────────────────────────────
  # Standard apt curl (HTTP/2 via libnghttp2). No QUIC needed.
  # Run with: docker compose run --rm load-tester-tcp
  # Output  : results/tcp_results_<ts>.json   +  tcp_summary_<ts>.txt
  load-tester-tcp:
    build:
      context: ./load-tester-tcp
    container_name: h2o-load-tester-tcp
    depends_on:
      server:
        condition: service_healthy
    environment:
      - REPETITIONS=${REPETITIONS:-40}
      - RESULTS_DIR=/results
    volumes:
      - ./results:/results
    restart: "no"
